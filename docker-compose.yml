services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: swift-deploy-1-node:latest
    container_name: swiftdeploy-app
    environment:
      - MODE=canary
      - APP_VERSION=1.0.2
      - APP_PORT=8000
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    user: appuser
    volumes:
      - app_logs:/app/logs
    networks:
      - swiftdeploy-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  nginx:
    image: nginx:alpine
    container_name: swiftdeploy-nginx
    ports:
      - "8080:8080"
    volumes:
      - ./templates/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    networks:
      - swiftdeploy-net
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  app_logs:
    driver: local
  nginx_logs:
    driver: local

networks:
  swiftdeploy-net:
    driver: bridge
