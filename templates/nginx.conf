user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format custom '$time_iso8601 | $status | ${request_time}s | $upstream_addr | $request';

    access_log /var/log/nginx/access.log custom;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 24 4k;
    proxy_intercept_errors on;

    server {
        listen 8080;
        server_name _;

        access_log /var/log/nginx/access.log custom;
        error_log /var/log/nginx/error.log warn;

        error_page 502 @error_502;
        error_page 503 @error_503;
        error_page 504 @error_504;

        location @error_502 {
            default_type application/json;
            add_header X-Deployed-By swiftdeploy always;
            return 502 '{"error": "Bad Gateway", "code": "502", "service": "api", "contact": "support@swiftdeploy.io"}';
        }

        location @error_503 {
            default_type application/json;
            add_header X-Deployed-By swiftdeploy always;
            return 503 '{"error": "Service Unavailable", "code": "503", "service": "api", "contact": "support@swiftdeploy.io"}';
        }

        location @error_504 {
            default_type application/json;
            add_header X-Deployed-By swiftdeploy always;
            return 504 '{"error": "Gateway Timeout", "code": "504", "service": "api", "contact": "support@swiftdeploy.io"}';
        }

        location / {
            proxy_pass http://app:8000;
            add_header X-Deployed-By swiftdeploy always;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass_header X-Mode;
        }
    }
}
